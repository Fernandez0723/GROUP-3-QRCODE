<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Our Memories ❤️</title>

<link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600&display=swap" rel="stylesheet">

<style>
*{margin:0;padding:0;box-sizing:border-box;}
body{
    font-family:'Montserrat',sans-serif;
    height:100vh;
    overflow:hidden;
    background: 
        linear-gradient(rgba(255,182,193,0.3), rgba(255,182,193,0.3)),
        url('Screenshot 2026-03-09 131651.png') no-repeat center center;
    background-size:cover;
}

.gallery{
    position:relative;
    width:100%;
    height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
}

.slide{
    position:absolute;
    width:100%;
    height:100%;
    opacity:0;
    display:flex;
    justify-content:center;
    align-items:center;
    animation:fadeSlide 20s infinite;
}

.slide img{
    max-width:100%;
    max-height:100%;
    object-fit:contain;
    object-position:center center;
    transition: transform 1s ease;
}

.slide:nth-child(1){animation-delay:0s;}
.slide:nth-child(2){animation-delay:5s;}
.slide:nth-child(3){animation-delay:10s;}
.slide:nth-child(4){animation-delay:15s;}

@keyframes fadeSlide{
    0%{opacity:0;}
    10%{opacity:1;}
    25%{opacity:1;}
    35%{opacity:0;}
    100%{opacity:0;}
}

.love-center{
    position:absolute;
    top:50%;
    left:50%;
    transform:translate(-50%, -50%);
    font-size:3em;
    font-weight:700;
    color:#ff2e63;
    text-shadow:
        2px 2px 0px white,
        4px 4px 15px rgba(0,0,0,0.4);
    letter-spacing:2px;
    text-align:center;
    z-index:10;
    font-family: 'Fredoka', sans-serif;
    padding:10px 20px;
    border-radius:25px;
    background: rgba(255,255,255,0.05);
}

.heart{
    position:absolute;
    bottom:-50px;
    color:red;
    font-size:25px;
    animation:floatHeart linear infinite;
}

@keyframes floatHeart{
    0%{transform:translateY(0) scale(1);opacity:1;}
    100%{transform:translateY(-100vh) scale(1.5);opacity:0;}
}

@media (max-width:1024px){
    .heart{font-size:18px;}
    .love-center{font-size:2.5em; padding:8px 16px;}
}
@media(max-width:768px){
    .heart{font-size:16px;}
    .love-center{font-size:2em; padding:6px 12px;}
}
@media(max-width:480px){
    .heart{font-size:14px;}
    .love-center{font-size:1.5em; padding:5px 10px;}
}
</style>
</head>
<body>

<!-- AUDIO ELEMENT -->
<audio id="bgMusic" loop muted playsinline>
    <source src="El Manu & Jessy Kang - Tahanan (Wedding Version) (Lyrics).mp3" type="audio/mpeg">
</audio>

<!--<div class="love-center">Our Memories ❤️</div>-->

<div class="gallery">
    <div class="slide"><img src="images/b959dbc9-c842-4ba0-a21d-ff07cb15d835.jpg" alt="Slide 1"></div>
    <div class="slide"><img src="images/3809fd1d-9420-4b1b-9f18-58d72aa67849.jpg" alt="Slide 2"></div>
    <div class="slide"><img src="images/92b7b00c-4210-444b-b044-fa8436daa88f.jpg" alt="Slide 3"></div>
    <div class="slide"><img src="images/5ae1ca07-dcc0-4235-85d7-e207725396b9.jpg" alt="Slide 4"></div>
</div>

<script>
/* HEART GENERATOR */
function createHeart(){
    const heart=document.createElement("div");
    heart.classList.add("heart");
    heart.innerHTML="❤️";
    heart.style.left=Math.random()*100+"vw";

    let screenWidth = window.innerWidth;
    if(screenWidth>1024){ heart.style.fontSize=(20+Math.random()*20)+"px"; }
    else if(screenWidth>768){ heart.style.fontSize=(15+Math.random()*10)+"px"; }
    else{ heart.style.fontSize=(12+Math.random()*8)+"px"; }

    heart.style.animationDuration=(3+Math.random()*3)+"s";
    document.body.appendChild(heart);
    setTimeout(()=>{ heart.remove(); },7000);
}

setInterval(createHeart,500);

/* SMOOTH AUTOPLAY MUSIC */
window.addEventListener('load', async () => {
    const music = document.getElementById('bgMusic');

    try {
        // Resume AudioContext
        const AudioCtx = new (window.AudioContext || window.webkitAudioContext)();
        if (AudioCtx.state === 'suspended') await AudioCtx.resume();

        // Play music immediately
        await music.play();

        // Optional: smooth fade-in
        music.volume = 0;
        let vol = 0;
        const fadeIn = setInterval(()=>{
            if(vol<1){ vol+=0.02; music.volume = vol; }
            else{ clearInterval(fadeIn); }
        }, 100);
    } catch(e){
        console.log("Autoplay failed, may need user interaction", e);
    }
});
</script>
</body>
</html>
