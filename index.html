<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Lesson - Week 13</title>
<link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600;700&display=swap" rel="stylesheet">
<style>
  body {
    margin: 0;
    font-family: 'Montserrat', sans-serif;
    background: #fdf6e3;
    color: #333;
    display: flex;
    justify-content: center;
    padding: 20px;
  }

  .lesson-container {
    max-width: 900px;
    width: 100%;
    background: #ffffff;
    border-radius: 20px;
    box-shadow: 0 10px 25px rgba(0,0,0,0.1);
    padding: 40px;
    margin-bottom: 30px;
  }

  .lesson-header {
    text-align: center;
    margin-bottom: 25px;
  }

  .lesson-header h1 {
    font-size: 2em;
    font-weight: 700;
    color: #f1c40f;
    margin: 0;
  }

  .lesson-header h2 {
    font-size: 1.4em;
    font-weight: 600;
    color: #0052cc;
    margin-top: 8px;
  }

  .lesson-content p {
    font-size: 1em;
    line-height: 1.6;
    margin-bottom: 15px;
  }

  .highlight {
    background: #fffae6;
    border-left: 5px solid #f1c40f;
    padding: 12px 18px;
    border-radius: 10px;
    margin: 12px 0;
  }

  /* Profile section */
  .profile-section {
    text-align: center;
    margin-top: 40px;
    padding-top: 30px;
    border-top: 2px dashed #f1c40f; /* subtle separator */
  }

  .profile-section img {
    width: 120px;
    height: 120px;
    border-radius: 50%;
    object-fit: cover;
    border: 4px solid #f1c40f;
    margin-bottom: 10px;
  }

  .profile-section .role {
    font-weight: 600;
    font-size: 1.1em;
    color: #0052cc;
    margin-bottom: 5px;
  }

  .profile-section .members {
    margin-top: 15px;
    font-size: 1em;
    color: #333;
    line-height: 1.5;
  }

  @media(max-width:768px){
    .lesson-container{padding:30px 20px;}
    .lesson-header h1{font-size:1.8em;}
    .lesson-header h2{font-size:1.2em;}
    .profile-section img{width:100px;height:100px;}
  }
  @media(max-width:480px){
    .lesson-container{padding:20px 15px;}
    .lesson-header h1{font-size:1.6em;}
    .lesson-header h2{font-size:1em;}
    .profile-section img{width:80px;height:80px;}
  }
</style>
</head>
<body>
<div class="lesson-container">
  <div class="lesson-header">
    <h1>Week 13</h1>
    <h2>Understanding the Self – Eastern & Western Perspectives</h2>
  </div>

  <div class="lesson-content" id="lesson-content">
    <!-- 100 dummy paragraphs for testing -->
    <script>
      const lessonContentDiv = document.currentScript.parentNode;
      for(let i=1; i<=100; i++){
        const p = document.createElement("p");
        p.textContent = `Paragraph ${i}: Lorem ipsum dolor sit amet, consectetur adipiscing elit. 
        Integer nec odio. Praesent libero. Sed cursus ante dapibus diam. Sed nisi. 
        Nulla quis sem at nibh elementum imperdiet. Duis sagittis ipsum. Praesent mauris. 
        Fusce nec tellus sed augue semper porta. Mauris massa. ${i} This is example content for testing layout with long lesson text.`;
        lessonContentDiv.appendChild(p);
      }
    </script>
  </div>

  <!-- Profile Section -->
  <div class="profile-section">
    <!-- Instructor -->
    <img src="images/instructor.jpg" alt="Instructor">
    <div class="role">Instructor: Ma'am Angel May B. Tano</div>

    <!-- Leader -->
    <div class="role">Leader: Jasmin Ignacio</div>

    <!-- Members -->
    <div class="members">
      Members: James Fernandez, Maria Cruz, John Doe, Ana Santos, Peter Lim
    </div>
  </div>
</div>
</body>
</html>
