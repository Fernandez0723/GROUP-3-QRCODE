<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Our Memories ❤️</title>

<link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600&display=swap" rel="stylesheet">

<style>
*{margin:0;padding:0;box-sizing:border-box;}

body{
    font-family:'Montserrat',sans-serif;
    height:100vh;
    overflow:hidden;

    /* BACKGROUND IMAGE WITH SOFT OVERLAY */
    background: 
        linear-gradient(rgba(255,182,193,0.3), rgba(255,182,193,0.3)),
        url('Screenshot 2026-03-09 131651.png') no-repeat center center;
    background-size:cover;
}

/* MUSIC CONTROL BUTTONS */
#musicControls{
    position:fixed;
    top:20px;
    left:20px;
    z-index:20;
    display:flex;
    gap:10px;
}

#musicControls button{
    padding:8px 14px;
    border:none;
    border-radius:8px;
    background:#ff2e63;
    color:white;
    font-weight:600;
    cursor:pointer;
    box-shadow:0 4px 6px rgba(0,0,0,0.3);
    transition:0.2s;
}

#musicControls button:hover{
    transform:scale(1.1);
}

/* FULLSCREEN GALLERY */
.gallery{
    position:relative;
    width:100%;
    height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
}

/* SLIDE */
.slide{
    position:absolute;
    width:100%;
    height:100%;
    display:flex;
    justify-content:center;
    align-items:center;
    opacity:0;
    z-index:0;
    transition: opacity 1s ease-in-out; /* smooth fade */
}

.slide.active{
    opacity:1;
    z-index:1;
}

.slide img{
    max-width:100%;
    max-height:100%;
    object-fit:contain;
    object-position:center center;
}

/* HEARTS */
.heart{
    position:absolute;
    bottom:-50px;
    color:red;
    font-size:25px;
    animation:floatHeart linear infinite;
}

@keyframes floatHeart{
    0%{transform:translateY(0) scale(1);opacity:1;}
    100%{transform:translateY(-100vh) scale(1.5);opacity:0;}
}

@media (max-width:1024px){.heart{font-size:18px;}}
@media(max-width:768px){.heart{font-size:16px;}}
@media(max-width:480px){.heart{font-size:14px;}}
</style>
</head>
<body>

<!-- MUSIC CONTROLS -->
<div id="musicControls">
    <button id="playBtn">Play</button>
    <button id="stopBtn">Stop</button>
</div>

<!-- AUDIO ELEMENT -->
<audio id="bgMusic" loop>
    <source src="El Manu - Tahanan (lyrics).mp3" type="audio/mpeg">
    Your browser does not support the audio element.
</audio>

<!-- IMAGE GALLERY -->
<div class="gallery">
    <div class="slide active"><img src="images/1st.jpg" alt="Slide 1"></div>
    <div class="slide"><img src="images/2nd.jpg" alt="Slide 2"></div>
    <div class="slide"><img src="images/3rd.jpg" alt="Slide 3"></div>
    <div class="slide"><img src="images/4rth.jpg" alt="Slide 4"></div>
    <div class="slide"><img src="images/5th.jpg" alt="Slide 5"></div>
    <div class="slide"><img src="images/6th.jpg" alt="Slide 6"></div>
    <div class="slide"><img src="images/7th.jpg" alt="Slide 7"></div>
    <div class="slide"><img src="images/8th.jpg" alt="Slide 8"></div>
    <div class="slide"><img src="images/9th.jpg" alt="Slide 9"></div>
    <div class="slide"><img src="images/10th.jpg" alt="Slide 10"></div>
    <div class="slide"><img src="images/11th.jpg" alt="Slide 11"></div>
    <div class="slide"><img src="images/12th.jpg" alt="Slide 12"></div>
    <div class="slide"><img src="images/13th.jpg" alt="Slide 13"></div>
    <div class="slide"><img src="images/14th.jpg" alt="Slide 14"></div>
    <div class="slide"><img src="images/15th.jpg" alt="Slide 15"></div>
    <div class="slide"><img src="images/16th.jpg" alt="Slide 16"></div>
    <div class="slide"><img src="images/17th.jpg" alt="Slide 17"></div>
    <div class="slide"><img src="images/18th.jpg" alt="Slide 18"></div>
    <div class="slide"><img src="images/19th.jpg" alt="Slide 19"></div>
    <div class="slide"><img src="images/20th.jpg" alt="Slide 20"></div>
    <div class="slide"><img src="images/21th.jpg" alt="Slide 21"></div>
    <div class="slide"><img src="images/22th.jpg" alt="Slide 22"></div>
    <div class="slide"><img src="images/23th.jpg" alt="Slide 23"></div>
    <div class="slide"><img src="images/24th.jpg" alt="Slide 24"></div>
    <div class="slide"><img src="images/25th.jpg" alt="Slide 25"></div>
    <div class="slide"><img src="images/26th.jpg" alt="Slide 26"></div>
    <div class="slide"><img src="images/27th.jpg" alt="Slide 27"></div>
    <div class="slide"><img src="images/28th.jpg" alt="Slide 28"></div>
    <div class="slide"><img src="images/29th.jpg" alt="Slide 29"></div>
    <div class="slide"><img src="images/30th.jpg" alt="Slide 30"></div>
    <div class="slide"><img src="images/31th.jpg" alt="Slide 31"></div>
    <div class="slide"><img src="images/32th.jpg" alt="Slide 32"></div>
</div>

<script>
/* HEART GENERATOR */
function createHeart(){
    const heart=document.createElement("div");
    heart.classList.add("heart");
    heart.innerHTML="❤️";
    heart.style.left=Math.random()*100+"vw";

    let screenWidth = window.innerWidth;
    if(screenWidth>1024){ heart.style.fontSize=(20+Math.random()*20)+"px"; }
    else if(screenWidth>768){ heart.style.fontSize=(15+Math.random()*10)+"px"; }
    else{ heart.style.fontSize=(12+Math.random()*8)+"px"; }

    heart.style.animationDuration=(3+Math.random()*3)+"s";
    document.body.appendChild(heart);
    setTimeout(()=>{ heart.remove(); },7000);
}
setInterval(createHeart,500);

/* MUSIC PLAY & STOP */
const bgMusic = document.getElementById('bgMusic');
document.getElementById('playBtn').addEventListener('click', ()=>{ bgMusic.play(); });
document.getElementById('stopBtn').addEventListener('click', ()=>{ bgMusic.pause(); bgMusic.currentTime=0; });

/* SLIDE SHOW LOGIC */
const slides = document.querySelectorAll('.slide');
let currentIndex = 0;
const totalSlides = slides.length;
const slideInterval = 5000; // 5 seconds per slide

setInterval(()=>{
    slides[currentIndex].classList.remove('active'); // fade out current
    currentIndex = (currentIndex+1) % totalSlides;
    slides[currentIndex].classList.add('active'); // fade in next
}, slideInterval);
</script>

</body>
</html>
